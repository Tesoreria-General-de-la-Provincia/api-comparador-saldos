services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comparador-saldos-api
    ports:
      - "${API_PORT:-8075}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=8000
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comparador-saldos-frontend
    ports:
      - "${FRONT_PORT:-3050}:80"
    depends_on:
      - api
    restart: unless-stopped
