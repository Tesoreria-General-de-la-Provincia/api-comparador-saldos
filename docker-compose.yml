services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comparador-saldos-api
    ports:
      - "${API_PORT:-8075}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=8000
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: comparador-saldos-frontend
    ports:
      - "${FRONT_PORT:-3050}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
