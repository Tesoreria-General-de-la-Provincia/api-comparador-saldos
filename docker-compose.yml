services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comparador-saldos-api
    ports:
      - "8075:8000"
    environment:
      - PORT=8000
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: comparador-saldos-frontend
    ports:
      - "3050:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
