<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Saldos TGP</title>
    <meta name="description" content="Comparador automático de saldos de Tesorería General de la Provincia.">
    <!-- Google Fonts for Alexandria Design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="curator-container">
        <header class="curator-header">
            <h1 class="serif-title">Comparador de Saldos</h1>
            <p class="body-text">Un análisis documental automatizado para conciliar los registros fiscales entre años contables. Presente sus archivos para iniciar la curaduría digital.</p>
        </header>

        <form id="compare-form" class="upload-form">
            <div class="form-grid">
                <!-- Dropzone 1 -->
                <div class="file-dropzone" id="dropzone-1">
                    <input type="file" id="file_year1" name="file_year1" accept=".csv" required class="file-input">
                    <label for="file_year1" class="file-label">
                        <span class="label-text">Documento Base (Año Anterior)</span>
                        <div class="drop-surface">
                            <span class="file-desc">Seleccione el archivo CSV o arrástrelo aquí</span>
                            <span class="file-name" id="name-1"></span>
                        </div>
                    </label>
                </div>

                <!-- Dropzone 2 -->
                <div class="file-dropzone" id="dropzone-2">
                    <input type="file" id="file_year2" name="file_year2" accept=".csv" required class="file-input">
                    <label for="file_year2" class="file-label">
                        <span class="label-text">Documento Reciente (Año Actual)</span>
                        <div class="drop-surface">
                            <span class="file-desc">Seleccione el archivo CSV o arrástrelo aquí</span>
                            <span class="file-name" id="name-2"></span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="actions">
                <button type="submit" id="submit-btn" class="btn-primary">
                    Proceder a la Comparación
                </button>
            </div>
            
            <div id="status-message" class="status-message hidden">
                <span>Compilando y curando registros. Aguarde un instante...</span>
            </div>
            <div id="error-message" class="error-message hidden"></div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
