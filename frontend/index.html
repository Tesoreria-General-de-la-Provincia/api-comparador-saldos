<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Saldos TGP</title>
    <meta name="description" content="Comparador automático de saldos de Tesorería General de la Provincia.">
    <!-- Google Fonts for Alexandria Design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="curator-container">
        <header class="curator-header">
            <h1 class="serif-title">Comparador de Saldos</h1>
            <p class="body-text">Herramienta para la conciliación de saldos bancarios interanuales. Suba sus archivos
                para identificar el estado de las cuentas y calcular las diferencias patrimoniales automáticamente.</p>
        </header>

        <form id="compare-form" class="upload-form">
            <div class="form-grid">
                <!-- Dropzone 1 -->
                <div class="file-dropzone" id="dropzone-1">
                    <input type="file" id="file_year1" name="file_year1" accept=".csv" required class="file-input">
                    <label for="file_year1" class="file-label">
                        <span class="label-text">Documento Base (Año Anterior)</span>
                        <div class="drop-surface">
                            <span class="file-desc">Seleccione el archivo CSV o arrástrelo aquí</span>
                            <span class="file-name" id="name-1"></span>
                            <div class="remove-file-btn" id="remove-1" title="Eliminar archivo">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                </svg>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- Dropzone 2 -->
                <div class="file-dropzone" id="dropzone-2">
                    <input type="file" id="file_year2" name="file_year2" accept=".csv" required class="file-input">
                    <label for="file_year2" class="file-label">
                        <span class="label-text">Documento Reciente (Año Actual)</span>
                        <div class="drop-surface">
                            <span class="file-desc">Seleccione el archivo CSV o arrástrelo aquí</span>
                            <span class="file-name" id="name-2"></span>
                            <div class="remove-file-btn" id="remove-2" title="Eliminar archivo">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                </svg>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="actions">
                <button type="submit" id="submit-btn" class="btn-primary">
                    Proceder a la Comparación
                </button>
            </div>


            <div id="error-message" class="error-message hidden"></div>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
